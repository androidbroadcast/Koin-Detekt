koin-rules:
  active: true

  # Service Locator Rules
  NoGetOutsideModuleDefinition:
    active: true

  NoInjectDelegate:
    active: true
    allowedSuperTypes:
      - 'Application'
      - 'Activity'
      - 'ComponentActivity'
      - 'AppCompatActivity'
      - 'FragmentActivity'
      - 'Fragment'
      - 'DialogFragment'
      - 'BottomSheetDialogFragment'
      - 'Service'
      - 'BroadcastReceiver'
      - 'ViewModel'
      - 'GlanceAppWidget'
      - 'GlanceAppWidgetReceiver'

  NoKoinComponentInterface:
    active: true
    allowedSuperTypes:
      - 'Application'
      - 'Activity'
      - 'Fragment'
      - 'Service'
      - 'BroadcastReceiver'
      - 'ViewModel'

  NoGlobalContextAccess:
    active: true

  NoKoinGetInApplication:
    active: true

  PreferLazyConstructorInjection:
    active: false
    checkAllTypes: false
    lazyTypes: []
    excludeTypes: []

  # Module DSL Rules
  EmptyModule:
    active: true

  SingleForNonSharedDependency:
    active: true
    namePatterns:
      - '.*UseCase'
      - '.*Interactor'
      - '.*Mapper'

  MissingScopedDependencyQualifier:
    active: true
    allowOneDefault: true

  DeprecatedKoinApi:
    active: true
    additionalDeprecations: []

  ModuleIncludesOrganization:
    active: false
    maxIncludesWithDefinitions: 3

  ModuleAsTopLevelVal:
    active: true

  ExcessiveCreatedAtStart:
    active: true
    maxCreatedAtStart: 10

  OverrideInIncludedModule:
    active: true

  ConstructorDslAmbiguousParameters:
    active: true

  ParameterTypeMatchesReturnType:
    active: true

  GenericDefinitionWithoutQualifier:
    active: true

  DuplicateBindingWithoutQualifier:
    active: true

  EnumQualifierCollision:
    active: true

  UnassignedQualifierInWithOptions:
    active: true

  # Scope Management Rules
  MissingScopeClose:
    active: true

  # Inactive by default: text-based heuristics cause false positives; needs PSI-based redesign.
  CloseableWithoutOnClose:
    active: false

  # Inactive by default: text-based matching causes false positives; needs PSI-based redesign.
  ScopeAccessInOnDestroy:
    active: false

  ScopedDependencyOutsideScopeBlock:
    active: true

  FactoryInScopeBlock:
    active: false

  KtorRequestScopeMisuse:
    active: true

  ScopeDeclareWithActivityOrFragment:
    active: true
    additionalLeakProneTypes: []

  ViewModelAsSingleton:
    active: true

  # Platform Rules - Compose
  KoinViewModelOutsideComposable:
    active: true

  KoinInjectInPreview:
    active: true

  RememberKoinModulesLeak:
    active: true

  # Platform Rules - Ktor
  KtorApplicationKoinInit:
    active: true

  KtorRouteScopeMisuse:
    active: true

  # Platform Rules - Android
  AndroidContextNotFromKoin:
    active: true

  StartKoinInActivity:
    active: true

  ActivityFragmentKoinScope:
    active: true

  # Architecture Rules
  LayerBoundaryViolation:
    active: false

  PlatformImportRestriction:
    active: false

  CircularModuleDependency:
    active: true

  GetConcreteTypeInsteadOfInterface:
    active: true

  # Koin Annotations Rules
  MixingDslAndAnnotations:
    active: true

  MissingModuleAnnotation:
    active: true

  ConflictingBindings:
    active: true

  MultipleKoinDefinitionAnnotations:
    active: true

  ScopedWithoutQualifier:
    active: true

  AnnotationProcessorNotConfigured:
    active: true
    skipCheck: false

  SingleAnnotationOnObject:
    active: true

  SingleOnAbstractClass:
    active: true

  TooManyInjectedParams:
    active: true
    maxInjectedParams: 5

  InvalidNamedQualifierCharacters:
    active: true

  KoinAnnotationOnExtensionFunction:
    active: true

  ViewModelAnnotatedAsSingle:
    active: true

  AnnotatedClassImplementsNestedInterface:
    active: true

  InjectedParamWithNestedGenericType:
    active: true

  MissingKoinStopInTest:
    active: true
    additionalTeardownAnnotations: []

  KoinViewModelOnNonViewModel:
    active: true
    additionalViewModelSuperTypes: []

  KoinWorkerOnNonWorker:
    active: true
    additionalWorkerSuperTypes: []

  InjectedParamAnnotationOrder:
    active: true

  QualifierObfuscationRisk:
    active: true
